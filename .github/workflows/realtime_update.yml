# 四资产ETF监控 — 数据更新 + Pages部署
# 合并两个触发：代码推送时部署 / 每30分钟拉数据+部署
name: Update & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'     # 每30分钟拉取ETF价格
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === 仅在定时触发时拉取数据（push时不拉）===
      - name: Setup Python (schedule only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch ETF prices (schedule only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python update_realtime.py --no-push
        timeout-minutes: 3
        continue-on-error: true

      - name: Commit data changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: EndBug/add-and-commit@v10
        with:
          add: 'data.json'
          message: '🔄 实时行情更新'
          default_author: github_actor

      # === 部署到 GitHub Pages ===
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
